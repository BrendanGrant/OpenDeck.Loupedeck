name: Release OpenDeck Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag version matches manifest
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $manifest = Get-Content -LiteralPath "./src/manifest.json" -Raw | ConvertFrom-Json
          $manifestVersion = [string]$manifest.Version
          $tagVersion = "${{ github.ref_name }}"

          if ($tagVersion.StartsWith("v")) {
            $tagVersion = $tagVersion.Substring(1)
          }

          if ($tagVersion -ne $manifestVersion) {
            throw "Git tag version '$tagVersion' does not match manifest version '$manifestVersion'."
          }

  publish-runtime:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest
          - runtime: linux-arm64
            os: ubuntu-24.04-arm
          - runtime: osx-arm64
            os: macos-14

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Linux Native AOT toolchain
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish ${{ matrix.runtime }} Native AOT
        shell: pwsh
        run: |
          dotnet publish ./src/OpenDeck.Loupedeck.csproj `
            -c Release `
            -r "${{ matrix.runtime }}" `
            --self-contained true `
            -p:DebugSymbols=false `
            -p:DebugType=None `
            -p:PublishAot=true `
            -o "./output/publish/${{ matrix.runtime }}"

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet publish failed for runtime '${{ matrix.runtime }}' with exit code $LASTEXITCODE."
          }

          $runtimeDir = "./output/publish/${{ matrix.runtime }}"
          $manifestPath = Join-Path $runtimeDir "manifest.json"
          $imagesPath = Join-Path $runtimeDir "images"

          if (Test-Path -LiteralPath $manifestPath) {
            Remove-Item -LiteralPath $manifestPath -Force
          }

          if (Test-Path -LiteralPath $imagesPath) {
            Remove-Item -LiteralPath $imagesPath -Recurse -Force
          }

      - name: Upload ${{ matrix.runtime }} runtime
        uses: actions/upload-artifact@v6
        with:
          name: runtime-${{ matrix.runtime }}
          path: output/publish/${{ matrix.runtime }}
          if-no-files-found: error

  package-and-release:
    needs: publish-runtime
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download runtime artifacts
        uses: actions/download-artifact@v6
        with:
          path: output/runtimes

      - name: Assemble plugin package
        shell: bash
        run: |
          set -euo pipefail

          plugin_name="io.github.brendangrant.opendeck.loupedeck.sdPlugin"
          plugin_dir="output/expanded/$plugin_name"

          mkdir -p "$plugin_dir/images"
          cp src/manifest.json "$plugin_dir/manifest.json"
          cp -R src/images/. "$plugin_dir/images/"

          for runtime in win-x64 linux-arm64 osx-arm64; do
            mkdir -p "$plugin_dir/$runtime"
            cp -R "output/runtimes/runtime-$runtime/." "$plugin_dir/$runtime/"
          done

          chmod +x "$plugin_dir/linux-arm64/opendeck-loupedeck"
          chmod +x "$plugin_dir/osx-arm64/opendeck-loupedeck"

          cd output/expanded
          zip -r "../$plugin_name" "$plugin_name"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: io.github.brendangrant.opendeck.loupedeck.sdPlugin
          path: output/io.github.brendangrant.opendeck.loupedeck.sdPlugin
          if-no-files-found: error

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/io.github.brendangrant.opendeck.loupedeck.sdPlugin
          generate_release_notes: true
